# Render Blueprint — deploy with "New > Blueprint Instance"
# https://render.com/docs/blueprint-spec

services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: energy-monitor-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: energy-monitor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: energy-monitor-redis
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

  # ── Background Worker ────────────────────────────────────────
  - type: worker
    name: energy-monitor-worker
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: node src/workers/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: energy-monitor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: energy-monitor-redis
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

# ── Databases ────────────────────────────────────────────────────
databases:
  - name: energy-monitor-db
    plan: free
    databaseName: energy_monitor
    postgresMajorVersion: "16"

# ── Redis ────────────────────────────────────────────────────────
# Note: Render free tier doesn't include Redis.
# Use Upstash free Redis or set REDIS_URL manually.
